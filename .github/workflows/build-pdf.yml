name: Build PDF

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-pdf.yml"
      - "book/**"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/build-pdf.yml"
      - "book/**"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pdf:
    name: Compile book
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build PDF
        run: make pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: qemu-book-pdf
          path: output/pdf/深入理解-QEMU-设计原理.pdf
          if-no-files-found: error
          retention-days: 30
